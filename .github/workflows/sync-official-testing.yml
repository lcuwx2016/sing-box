name: Sync Official Testing

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-official-testing
  cancel-in-progress: false

jobs:
  sync:
    name: Sync upstream testing branch
    runs-on: ubuntu-latest
    steps:
      - name: Require sync token
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          if [[ -z "$SYNC_TOKEN" ]]; then
            echo "Missing SYNC_TOKEN repository secret with Contents and Workflows write permissions." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Fetch upstream testing
        id: source
        run: |
          set -euo pipefail
          git remote add official https://github.com/SagerNet/sing-box.git
          git fetch --no-tags official "+refs/heads/testing:refs/remotes/official/testing"
          commit=$(git rev-parse refs/remotes/official/testing)
          echo "commit=$commit" >> "$GITHUB_OUTPUT"

      - name: Update official-testing branch
        id: branch
        env:
          COMMIT: ${{ steps.source.outputs.commit }}
        run: |
          set -euo pipefail
          destination=refs/heads/official-testing
          current=$(git ls-remote --heads origin "$destination" | awk 'NR == 1 { print $1 }')
          if [[ "$current" == "$COMMIT" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ -n "$current" ]]; then
            git push origin \
              --force-with-lease="$destination:$current" \
              "$COMMIT:$destination"
          else
            git push origin "$COMMIT:$destination"
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Add job summary
        env:
          COMMIT: ${{ steps.source.outputs.commit }}
          CHANGED: ${{ steps.branch.outputs.changed }}
        run: |
          {
            echo "## Official testing sync"
            echo
            echo "- Source: \`SagerNet/sing-box:testing\`"
            echo "- Destination: \`official-testing\`"
            echo "- Commit: \`$COMMIT\`"
            echo "- Branch updated: \`$CHANGED\`"
          } >> "$GITHUB_STEP_SUMMARY"
