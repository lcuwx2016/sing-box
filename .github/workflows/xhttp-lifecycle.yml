name: XHTTP Lifecycle

on:
  push:
    paths:
      - '.github/workflows/xhttp-lifecycle.yml'
      - 'constant/v2ray.go'
      - 'option/v2ray_transport.go'
      - 'transport/v2ray/transport.go'
      - 'transport/v2rayxhttp/**'
  pull_request:
    paths:
      - '.github/workflows/xhttp-lifecycle.yml'
      - 'constant/v2ray.go'
      - 'option/v2ray_transport.go'
      - 'transport/v2ray/transport.go'
      - 'transport/v2rayxhttp/**'
  schedule:
    - cron: '17 2 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: xhttp-lifecycle-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lifecycle:
    name: Lifecycle and transport tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.7'
          cache: true

      - name: Test XHTTP lifecycle with race detection
        run: >-
          go test -race -count=1 ./transport/v2rayxhttp
          -run '^Test(TransportLongLivedConnections|ServerSessionReordersDelayedPackets|PacketUpReordersDelayedHTTPRequests|ServerSessionExpiryReclaimsOrphan|TransportResourceCleanup)$'

      - name: Test XHTTP transport
        run: go test -count=1 ./transport/v2rayxhttp

      - name: Test HTTP/3 transport path
        run: go test -count=1 -tags with_quic ./transport/v2rayxhttp

      - name: Test uTLS transport path
        run: go test -count=1 -tags with_utls ./transport/v2rayxhttp
