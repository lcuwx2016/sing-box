name: Publish Development Builds

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux, arch: amd64, extension: tar.gz }
          - { os: windows, arch: amd64, extension: zip }
          - { os: android, arch: arm64, extension: tar.gz, ndk: aarch64-linux-android23 }
          - { os: android, arch: arm, extension: tar.gz, ndk: armv7a-linux-androideabi23 }
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ~1.25.11
      - name: Setup Android NDK
        if: matrix.os == 'android'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28
          local-cache: true
      - name: Set version
        id: version
        run: echo "version=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Build
        if: matrix.os != 'android'
        run: |
          set -xeuo pipefail
          mkdir -p dist
          go build -v -trimpath -o "dist/sing-box${{ matrix.os == 'windows' && '.exe' || '' }}" \
            -tags "$(cat release/DEFAULT_BUILD_TAGS_OTHERS)" \
            -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${{ steps.version.outputs.version }}' $(cat release/LDFLAGS) -s -w -buildid=" \
            ./cmd/sing-box
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
      - name: Build Android
        if: matrix.os == 'android'
        run: |
          set -xeuo pipefail
          go install -v ./cmd/internal/build
          export CC='${{ matrix.ndk }}-clang'
          export CXX="${CC}++"
          mkdir -p dist
          GOOS="$BUILD_GOOS" GOARCH="$BUILD_GOARCH" build go build -v -trimpath -o dist/sing-box \
            -tags "$(cat release/DEFAULT_BUILD_TAGS_OTHERS)" \
            -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${{ steps.version.outputs.version }}' $(cat release/LDFLAGS) -s -w -buildid=" \
            ./cmd/sing-box
        env:
          CGO_ENABLED: "1"
          BUILD_GOOS: ${{ matrix.os }}
          BUILD_GOARCH: ${{ matrix.arch }}
      - name: Install apk-tools
        if: matrix.os == 'linux'
        run: |
          set -xeuo pipefail
          docker run --rm -v /usr/local/bin:/mnt alpine:edge \
            sh -c 'apk add --no-cache apk-tools-static && cp /sbin/apk.static /mnt/apk && chmod +x /mnt/apk'
      - name: Package Alpine APK
        if: matrix.os == 'linux'
        run: |
          set -xeuo pipefail
          apk_version="0.0.0_p$((16#${GITHUB_SHA::7}))"
          .github/build_alpine_apk.sh \
            x86_64 \
            "$apk_version" \
            "dist/sing-box" \
            "dist/sing-box-${{ steps.version.outputs.version }}-linux-x86_64.apk"
      - name: Archive
        run: |
          set -xeuo pipefail
          name="sing-box-${{ steps.version.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir -p "dist/$name"
          cp LICENSE "dist/$name/"
          cp "dist/sing-box${{ matrix.os == 'windows' && '.exe' || '' }}" "dist/$name/"
          if [[ "${{ matrix.extension }}" == "zip" ]]; then
            (cd dist && zip -qr "$name.zip" "$name")
          else
            tar -C dist -czf "dist/$name.tar.gz" "$name"
          fi
          rm -rf "dist/$name" "dist/sing-box${{ matrix.os == 'windows' && '.exe' || '' }}"
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish GitHub Release
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Set release metadata
        id: metadata
        run: |
          version=${GITHUB_SHA::7}
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$version" >> "$GITHUB_OUTPUT"
      - name: Download builds
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ steps.metadata.outputs.tag }}
          VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          set -xeuo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* \
              --target "$GITHUB_SHA" \
              --title "Release $VERSION" \
              --generate-notes
          fi
