name: Publish Development Builds

on:
  push:
    branches:
      - dev-next

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux, arch: amd64, extension: tar.gz }
          - { os: windows, arch: amd64, extension: zip }
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ~1.25.11
      - name: Set version
        id: version
        run: echo "version=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Build
        run: |
          set -xeuo pipefail
          mkdir -p dist
          go build -v -trimpath -o "dist/sing-box${{ matrix.os == 'windows' && '.exe' || '' }}" \
            -tags "$(cat release/DEFAULT_BUILD_TAGS_OTHERS)" \
            -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${{ steps.version.outputs.version }}' $(cat release/LDFLAGS) -s -w -buildid=" \
            ./cmd/sing-box
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
      - name: Archive
        run: |
          set -xeuo pipefail
          name="sing-box-${{ steps.version.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir -p "dist/$name"
          cp LICENSE "dist/$name/"
          cp "dist/sing-box${{ matrix.os == 'windows' && '.exe' || '' }}" "dist/$name/"
          if [[ "${{ matrix.extension }}" == "zip" ]]; then
            (cd dist && zip -qr "$name.zip" "$name")
          else
            tar -C dist -czf "dist/$name.tar.gz" "$name"
          fi
          rm -rf "dist/$name" "dist/sing-box${{ matrix.os == 'windows' && '.exe' || '' }}"
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*.${{ matrix.extension }}
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Set release metadata
        id: metadata
        run: |
          version=${GITHUB_SHA::7}
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$version" >> "$GITHUB_OUTPUT"
      - name: Download builds
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true
      - name: Create or update prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ steps.metadata.outputs.tag }}
          VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          set -xeuo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* \
              --target "$GITHUB_SHA" \
              --title "Release $VERSION" \
              --generate-notes
          fi
