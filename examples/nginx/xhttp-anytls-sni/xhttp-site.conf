# Include this file inside the top-level `http {}` context.
# The public :443 listener is in stream-sni.conf; this server is loopback-only.

server {
    listen 127.0.0.1:9443 ssl http2;
    server_name xhttp.example.com;

    # Use a Cloudflare Origin Certificate when the hostname is proxied by CF.
    ssl_certificate     /etc/nginx/certs/xhttp-origin.pem;
    ssl_certificate_key /etc/nginx/certs/xhttp-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/xhttp-site;
    index index.html;

    # This location is intentionally exact. Requests without the token are
    # indistinguishable from ordinary missing resources to outside callers.
    location = /assets/7d91f0c2a8e54b6f/manifest {
        if ($arg_k != "CHANGE_TO_A_LONG_RANDOM_TOKEN") {
            return 404;
        }

        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
