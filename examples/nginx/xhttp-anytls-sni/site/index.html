<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Personal network and application services.">
  <title>Network Services</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      max-width: 44rem;
      margin: 12vh auto;
      padding: 0 1.5rem;
      color: #1f2937;
      background: #f8fafc;
      font: 16px/1.65 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main { padding: 2rem; background: #fff; border: 1px solid #e5e7eb; border-radius: .75rem; }
    h1 { margin: 0 0 .5rem; font-size: 1.8rem; }
    p { margin: .5rem 0; color: #4b5563; }
    .status { color: #166534; }
    footer { margin-top: 1.5rem; color: #6b7280; font-size: .875rem; }
    @media (prefers-color-scheme: dark) {
      body { color: #e5e7eb; background: #111827; }
      main { background: #1f2937; border-color: #374151; }
      p, footer { color: #cbd5e1; }
      .status { color: #86efac; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Network Services</h1>
    <p>This site provides personal network and application services.</p>
    <p class="status">Service status: operational.</p>
  </main>
  <footer>© 2026</footer>
</body>
</html>
