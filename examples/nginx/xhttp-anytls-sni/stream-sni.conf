# Include this file inside the top-level `stream {}` context.
# Requires the nginx stream and ssl_preread modules.

map $ssl_preread_server_name $sni_backend {
    anytls.example.com anytls_backend;
    xhttp.example.com  xhttp_https_frontend;
    default            xhttp_https_frontend;
}

upstream anytls_backend {
    # sing-box AnyTLS inbound: TLS terminates in sing-box.
    server 127.0.0.1:8443;
}

upstream xhttp_https_frontend {
    # The local Nginx HTTP server from xhttp-site.conf.
    server 127.0.0.1:9443;
}

server {
    listen 443 reuseport;
    ssl_preread on;
    proxy_connect_timeout 5s;
    proxy_timeout 1h;
    proxy_pass $sni_backend;
}
